---
layout: default
---

<header>
  <h3><a href="/">⇦ Cameron Ball</a></h3>
</header>
{% for post in site.posts %}
  {% assign read_time = post.content | number_of_words | divided_by: 180 %}
  <section class="blog-column">
    <div class="wrapper">
      <div class="post-metadata">
        <span>
          {{ post.date | date: "%m/%d/%y" }}
        </span>
        <span>
          <i class="fa-regular fa-clock"></i> {{ read_time }} minute read
        </span>
      </div>
      <div class="content">
        <div class="header">
          <a href={{post.url}}><h2>{{ post.title }}</h2></a>
        </div>
        {{ post.excerpt }}
      </div>
    </div>
  </section>
{% endfor %}
